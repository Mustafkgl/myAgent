<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" rx="10" fill="#0f172a" />
  <text x="200" y="30" font-family="monospace" font-size="14" font-weight="bold" fill="#38bdf8" text-anchor="middle">🔍 DERİN ARAMA (RIPGREP)</text>
  
  <!-- UI Sidebar representation -->
  <rect x="30" y="60" width="100" height="110" rx="4" fill="#1e293b" />
  <text x="40" y="80" font-family="monospace" font-size="9" fill="#c084fc" font-weight="bold">SEARCHING...</text>
  <text x="40" y="100" font-family="monospace" font-size="8" fill="#4ade80">auth_screen.py</text>
  <text x="40" y="115" font-family="monospace" font-size="8" fill="#4ade80">models.py</text>
  <text x="40" y="130" font-family="monospace" font-size="8" fill="#4ade80">tui.py</text>

  <!-- Large Project representation -->
  <circle cx="280" cy="110" r="50" fill="none" stroke="#334155" stroke-dasharray="2" />
  <text x="280" y="115" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">10.000+ Dosya</text>
  
  <!-- Search Ray -->
  <path d="M 130 85 L 230 110" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite" />
  </path>
  
  <text x="200" y="145" font-family="monospace" font-size="9" fill="#38bdf8" text-anchor="middle">Milisaniyeler içinde</text>
  <text x="200" y="158" font-family="monospace" font-size="9" fill="#38bdf8" text-anchor="middle">nokta atışı bağlam</text>
</svg>
