<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="#0f172a" />
  
  <!-- Header -->
  <rect width="800" height="32" rx="12" fill="#1e293b" />
  <circle cx="20" cy="16" r="4" fill="#ff5f57" />
  <circle cx="36" cy="16" r="4" fill="#febc2e" />
  <circle cx="52" cy="16" r="4" fill="#28c840" />
  <text x="400" y="21" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">myAgent — tui_features</text>

  <!-- Left Sidebar (Files) -->
  <rect x="0" y="32" width="160" height="386" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
  <text x="15" y="55" font-family="monospace" font-size="11" font-weight="bold" fill="#c084fc">📁 DOSYALAR</text>
  <text x="15" y="80" font-family="monospace" font-size="10" fill="#94a3b8">  myagent/</text>
  <text x="15" y="100" font-family="monospace" font-size="10" fill="#f8fafc">    tui.py</text>
  <text x="15" y="120" font-family="monospace" font-size="10" fill="#94a3b8">    agent/</text>
  <text x="15" y="140" font-family="monospace" font-size="10" fill="#94a3b8">    config/</text>

  <!-- Right Sidebar (Pipeline) -->
  <rect x="600" y="32" width="200" height="386" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="615" y="55" font-family="monospace" font-size="11" font-weight="bold" fill="#4285F4">⚙️ İŞLEMLER</text>
  <rect x="610" y="70" width="180" height="20" rx="4" fill="#0f172a" />
  <text x="615" y="84" font-family="monospace" font-size="10" fill="#4ade80">✓ STEP 1: Plan</text>
  <text x="615" y="105" font-family="monospace" font-size="10" fill="#f8fafc">⏳ STEP 2: Worker</text>
  <text x="615" y="125" font-family="monospace" font-size="10" fill="#94a3b8">  · Writing main.py</text>
  <text x="615" y="145" font-family="monospace" font-size="10" fill="#94a3b8">  · Testing routes...</text>

  <!-- Center (Chat) -->
  <text x="175" y="70" font-family="monospace" font-size="12" fill="#D97706" font-weight="bold">Sen</text>
  <text x="175" y="90" font-family="monospace" font-size="11" fill="#f8fafc">Hızlı bir port tarayıcı yaz.</text>
  
  <rect x="175" y="110" width="410" height="150" rx="8" fill="#1e293b" />
  <text x="185" y="130" font-family="monospace" font-size="12" fill="#c084fc" font-weight="bold">Claude</text>
  <text x="185" y="150" font-family="monospace" font-size="10" fill="#cbd5e1">Harika bir fikir! İşte planım:</text>
  <text x="185" y="170" font-family="monospace" font-size="10" fill="#cbd5e1">1. socket kütüphanesini kullan.</text>
  <text x="185" y="185" font-family="monospace" font-size="10" fill="#cbd5e1">2. Hata yakalama (exception) ekle.</text>
  <text x="185" y="210" font-family="monospace" font-size="11" fill="#4ade80">Devam edilsin mi? (e/h)</text>

  <!-- Footer -->
  <rect x="0" y="418" width="800" height="32" rx="12" fill="#1e293b" />
  <text x="15" y="438" font-family="monospace" font-size="10" fill="#f8fafc">
    <tspan fill="#4285F4" font-weight="bold">^B</tspan> Dosyalar  
    <tspan fill="#4285F4" font-weight="bold">^E</tspan> İşlemler  
    <tspan fill="#4285F4" font-weight="bold">^K</tspan> Seçim  
    <tspan fill="#4285F4" font-weight="bold">^S</tspan> Ayarlar
  </text>
